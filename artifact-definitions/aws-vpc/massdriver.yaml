name: aws-vpc
label: AWS VPC

ui:
  environmentDefaultGroup: networks

schema:
  title: AWS VPC
  description: AWS VPC with public and private subnets for workload connectivity
  type: object
  required:
    - id
    - cidr
    - region
    - public_subnets
    - private_subnets
  properties:
    id:
      title: VPC ID
      description: The AWS VPC identifier
      type: string
    arn:
      title: VPC ARN
      description: The AWS VPC ARN
      type: string
    cidr:
      title: VPC CIDR
      description: The CIDR block of the VPC
      type: string
    region:
      title: AWS Region
      description: The AWS region where the VPC is deployed
      type: string
    public_subnets:
      title: Public Subnets
      description: Public subnets with internet gateway access
      type: array
      items:
        type: object
        properties:
          id:
            title: Subnet ID
            type: string
          arn:
            title: Subnet ARN
            type: string
          cidr:
            title: Subnet CIDR
            type: string
          availability_zone:
            title: Availability Zone
            type: string
    private_subnets:
      title: Private Subnets
      description: Private subnets with NAT gateway access
      type: array
      items:
        type: object
        properties:
          id:
            title: Subnet ID
            type: string
          arn:
            title: Subnet ARN
            type: string
          cidr:
            title: Subnet CIDR
            type: string
          availability_zone:
            title: Availability Zone
            type: string
