name: mariadb
label: MariaDB

schema:
  title: MariaDB Database
  description: MariaDB database instance with connection details and access policies
  type: object
  required:
    - auth
    - id
    - security_group_id
    - secrets_manager_arn
    - policies
  properties:
    auth:
      title: Authentication
      description: Database connection parameters
      type: object
      required:
        - hostname
        - port
        - database
        - username
        - password
      properties:
        hostname:
          title: Host
          description: Database server hostname or IP
          type: string
        port:
          title: Port
          description: TCP port number
          type: integer
          default: 3306
        database:
          title: Database
          description: Default database name
          type: string
        username:
          title: Username
          description: Authentication username
          type: string
        password:
          $md.sensitive: true
          $md.copyable: false
          title: Password
          description: Authentication password
          type: string
    id:
      title: ID
      description: Unique database instance identifier
      type: string
    security_group_id:
      title: Security Group ID
      description: VPC security group controlling network access to the database. Consuming bundles can create ingress rules against this group to establish auditable, programmatic connectivity.
      type: string
    secrets_manager_arn:
      title: Secrets Manager ARN
      description: ARN of the AWS Secrets Manager secret containing database credentials (username and password). Applications should reference this ARN at runtime instead of passing raw credentials.
      type: string
    policies:
      title: Access Policies
      description: Available IAM policies for database access
      type: array
      items:
        type: object
        required:
          - id
          - name
        properties:
          id:
            title: ID
            description: Policy identifier
            type: string
          name:
            title: Name
            description: Human-readable policy name
            type: string
