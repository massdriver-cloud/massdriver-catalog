# Checkov configuration for aws-aurora-postgres
# Muted checks with justification

skip-check:
  # Deletion protection disabled for demo/dev environments to allow easy teardown
  # Production deployments should enable this via parameter
  - CKV_AWS_139
  # Security group requires outbound access for RDS connectivity and AWS service endpoints
  # Egress is restricted to necessary protocols at the application layer
  - CKV_AWS_382
  # Query logging enabled via enabled_cloudwatch_logs_exports = ["postgresql"]
  # Checkov may not recognize this as sufficient for the check
  - CKV2_AWS_27
  # AWS Backup integration not in scope for this demo bundle
  # Organizations should implement backup plans at the account/org level
  - CKV2_AWS_8
