name: aws-aurora-postgres
description: "Aurora PostgreSQL Serverless v2 for demo workloads"
source_url: https://github.com/massdriver-cloud/massdriver-catalog/tree/main/bundles/aws-aurora-postgres
version: 0.0.1

params:
  required:
    - region
    - engine_version
    - database_name
    - username
  properties:
    region:
      type: string
      title: Region
      description: AWS region for Aurora cluster
      default: "us-east-1"
      enum:
        - "us-east-1"
        - "us-east-2"
        - "us-west-1"
        - "us-west-2"
        - "eu-west-1"
        - "eu-central-1"
        - "ap-southeast-1"
    engine_version:
      type: string
      title: PostgreSQL Version
      description: PostgreSQL major version
      default: "16.4"
      $md.immutable: true
      enum:
        - "13.15"
        - "14.12"
        - "15.7"
        - "16.4"
    database_name:
      type: string
      title: Database Name
      description: Name of the default database
      default: "app"
      pattern: ^[a-z][a-z0-9_]*$
    username:
      type: string
      title: Database Username
      description: Admin username
      default: "postgres"
      pattern: ^[a-z][a-z0-9_]*$
    capacity:
      type: object
      title: Capacity
      properties:
        min_acu:
          type: number
          title: Minimum ACUs
          description: Minimum Aurora Capacity Units (0.5 to 128)
          default: 0.5
          enum: [0.5, 1, 2, 4, 8, 16]
        max_acu:
          type: number
          title: Maximum ACUs
          description: Maximum Aurora Capacity Units (0.5 to 128)
          default: 1
          enum: [0.5, 1, 2, 4, 8, 16, 32]
    availability:
      type: object
      title: Availability
      properties:
        multi_az:
          type: boolean
          title: Multi-AZ
          description: Enable multi-AZ deployment (increases availability and cost)
          default: false
    backup:
      type: object
      title: Backup Configuration
      properties:
        retention_days:
          type: integer
          title: Backup Retention (Days)
          description: Number of days to retain automated backups
          default: 7
          minimum: 1
          maximum: 35

connections:
  required:
    - aws_authentication
    - vpc
  properties:
    aws_authentication:
      $ref: aws-iam-role
      title: AWS IAM Role
    vpc:
      $ref: aws-vpc
      title: AWS VPC

artifacts:
  required:
    - database
  properties:
    database:
      $ref: postgres
      title: PostgreSQL Database

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - region
    - engine_version
    - database_name
    - username
    - capacity
    - availability
    - backup
    - "*"
