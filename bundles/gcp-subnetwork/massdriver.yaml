name: gcp-subnetwork
description: "GCP VPC network with regional subnetwork for demo workloads"
source_url: https://github.com/massdriver-cloud/massdriver-catalog/tree/main/bundles/gcp-subnetwork
version: 0.0.1

params:
  required:
    - region
    - cidr
  properties:
    region:
      type: string
      title: Region
      description: GCP region for subnetwork resources
      default: "us-central1"
      enum:
        - "us-central1"
        - "us-east1"
        - "us-west1"
        - "europe-west1"
        - "asia-east1"
    cidr:
      type: string
      title: Subnet CIDR
      description: IP range for the regional subnet
      default: "10.0.0.0/20"
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
    private_services_cidr:
      type: string
      title: Private Services CIDR
      description: IP range for Private Services Access (Cloud SQL, etc.)
      default: "10.100.0.0/16"
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

connections:
  required:
    - gcp_authentication
  properties:
    gcp_authentication:
      $ref: gcp-service-account
      title: GCP Service Account

artifacts:
  required:
    - subnetwork
  properties:
    subnetwork:
      $ref: gcp-subnetwork
      title: GCP Subnetwork

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:
    order:
      - region
      - cidr
      - private_services_cidr
      - "*"
