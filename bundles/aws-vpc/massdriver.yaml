name: aws-vpc
description: "AWS VPC with public and private subnets across multiple availability zones."
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/aws-vpc
version: 0.1.1

params:
  examples:
    - __name: Development
      region: us-east-1
      cidr: "10.0.0.0/16"
      create_nat_gateway: false
    - __name: Production
      region: us-east-1
      cidr: "10.0.0.0/16"
      create_nat_gateway: true

  required:
    - region
    - cidr
  properties:
    region:
      type: string
      title: AWS Region
      description: AWS region to deploy the VPC.
      default: "us-east-1"
      $md.immutable: true
      enum:
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
        - eu-west-1
        - eu-west-2
        - eu-central-1
        - ap-southeast-1
        - ap-southeast-2
        - ap-northeast-1
    cidr:
      type: string
      title: Network CIDR
      description: CIDR block for the VPC. Cannot be changed after creation — changing a VPC CIDR forces replacement of all resources.
      default: "10.0.0.0/16"
      $md.immutable: true
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
    create_nat_gateway:
      type: boolean
      title: Create NAT Gateway
      description: Create a NAT Gateway for private subnet egress. Disable in development to avoid Elastic IP usage. Private subnets will have no outbound internet access when disabled.
      default: true

connections:
  required:
    - aws_authentication
  properties:
    aws_authentication:
      $ref: aws-iam-role
      title: AWS Authentication

artifacts:
  required:
    - aws_vpc
  properties:
    aws_vpc:
      $ref: aws-vpc
      title: AWS VPC

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - region
    - cidr
    - "*"
