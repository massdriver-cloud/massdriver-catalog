name: aws-vpc
description: Amazon VPC with public and private subnets across multiple availability zones.
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/aws-vpc
version: 0.0.0

params:
  examples:
    - __name: Development
      cidr: "10.0.0.0/16"
      availability_zone_count: 2
      nat_gateway_mode: single
    - __name: Production
      cidr: "10.10.0.0/16"
      availability_zone_count: 3
      nat_gateway_mode: per-az
  required:
    - cidr
    - availability_zone_count
    - nat_gateway_mode
  properties:
    cidr:
      type: string
      title: VPC CIDR
      description: Primary IPv4 CIDR block for the VPC. Pick a /16 that does not overlap with peered networks.
      default: "10.0.0.0/16"
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
      $md.immutable: true
    availability_zone_count:
      type: integer
      title: Availability Zones
      description: Number of AZs to spread subnets across. Three is recommended for production workloads.
      default: 3
      enum:
        - 2
        - 3
      $md.immutable: true
    nat_gateway_mode:
      type: string
      title: NAT Gateway Mode
      description: |
        How outbound internet access from private subnets is provided.
        - `single`: one NAT Gateway, lower cost, AZ-failure exposure
        - `per-az`: one NAT Gateway per AZ, higher cost, AZ-resilient
        - `none`: no NAT Gateway (workloads cannot reach the internet)
      default: single
      enum:
        - single
        - per-az
        - none
    enable_flow_logs:
      type: boolean
      title: Enable VPC Flow Logs
      description: Send VPC Flow Logs to CloudWatch for security and traffic analysis.
      default: true
    enable_dns_hostnames:
      type: boolean
      title: Enable DNS Hostnames
      description: Required for many AWS services (RDS, ALB) that depend on internal DNS.
      default: true

connections:
  required:
    - aws_authentication
  properties:
    aws_authentication:
      $ref: aws-iam-role
      title: AWS Authentication

artifacts:
  required:
    - vpc
  properties:
    vpc:
      $ref: aws-vpc
      title: VPC

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - cidr
    - availability_zone_count
    - nat_gateway_mode
    - enable_flow_logs
    - enable_dns_hostnames
    - "*"
