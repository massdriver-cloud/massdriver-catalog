name: aws-vpc
description: "AWS VPC with public and private subnets for demo workloads"
source_url: https://github.com/massdriver-cloud/massdriver-catalog/tree/main/bundles/aws-vpc
version: 0.0.1

params:
  required:
    - region
    - cidr
  properties:
    region:
      type: string
      title: Region
      description: AWS region for VPC resources
      default: "us-east-1"
      enum:
        - "us-east-1"
        - "us-east-2"
        - "us-west-1"
        - "us-west-2"
        - "eu-west-1"
        - "eu-central-1"
        - "ap-southeast-1"
    cidr:
      type: string
      title: VPC CIDR
      description: IP range for the VPC
      default: "10.0.0.0/16"
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
    enable_flow_logs:
      type: boolean
      title: Enable VPC Flow Logs
      description: Enable VPC Flow Logs for network monitoring
      default: true

connections:
  required:
    - aws_authentication
  properties:
    aws_authentication:
      $ref: aws-iam-role
      title: AWS IAM Role

artifacts:
  required:
    - vpc
  properties:
    vpc:
      $ref: aws-vpc
      title: AWS VPC

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:
    order:
      - region
      - cidr
      - enable_flow_logs
      - "*"
