name: aws-dynamodb-table
description: "AWS DynamoDB table with encryption at rest, PITR recovery, and deletion protection hardcoded for compliance."
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/aws-dynamodb-table
version: 0.1.0

params:
  required:
    - region
    - table_name
    - hash_key
    - billing_mode
  properties:
    region:
      type: string
      title: AWS Region
      description: AWS region where the table will be created. Cannot be changed after creation.
      $md.immutable: true
      enum:
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
        - ca-central-1
        - eu-west-1
        - eu-west-2
        - eu-central-1
        - ap-northeast-1
        - ap-northeast-2
        - ap-southeast-1
        - ap-southeast-2
        - ap-south-1
        - sa-east-1
    table_name:
      type: string
      title: Table Name
      description: Name of the DynamoDB table. Cannot be changed after creation.
      $md.immutable: true
      minLength: 3
      maxLength: 255
      pattern: "^[a-zA-Z0-9_.-]{3,255}$"
    hash_key:
      type: string
      title: Hash Key (Partition Key)
      description: Attribute name for the partition key. Cannot be changed after creation.
      $md.immutable: true
      minLength: 1
      maxLength: 255
    hash_key_type:
      type: string
      title: Hash Key Type
      description: Data type of the partition key. Cannot be changed after creation.
      $md.immutable: true
      default: "S"
      enum:
        - "S"
        - "N"
        - "B"
      enumNames:
        - "String (S)"
        - "Number (N)"
        - "Binary (B)"
    range_key:
      type: string
      title: Range Key (Sort Key)
      description: Optional sort key attribute name. Cannot be changed after creation.
      $md.immutable: true
      minLength: 1
      maxLength: 255
    range_key_type:
      type: string
      title: Range Key Type
      description: Data type of the sort key. Only applies when Range Key is set. Cannot be changed after creation.
      $md.immutable: true
      default: "S"
      enum:
        - "S"
        - "N"
        - "B"
      enumNames:
        - "String (S)"
        - "Number (N)"
        - "Binary (B)"
    billing_mode:
      type: string
      title: Billing Mode
      description: "PAY_PER_REQUEST scales automatically w/ no capacity planning. PROVISIONED offers lower cost at high or steady traffic but requires capacity units. Immutable."
      $md.immutable: true
      default: "PAY_PER_REQUEST"
      enum:
        - "PAY_PER_REQUEST"
        - "PROVISIONED"
    read_capacity:
      type: integer
      title: Read Capacity Units
      description: Provisioned read throughput (only used when Billing Mode is PROVISIONED).
      default: 5
      minimum: 1
      maximum: 40000
    write_capacity:
      type: integer
      title: Write Capacity Units
      description: Provisioned write throughput (only used when Billing Mode is PROVISIONED).
      default: 5
      minimum: 1
      maximum: 40000
    enable_streams:
      type: boolean
      title: Enable DynamoDB Streams
      description: Capture item-level changes as a stream for Lambda or other consumers.
      default: false
    stream_view_type:
      type: string
      title: Stream View Type
      description: What data is written to the stream. Only used when streams are enabled.
      default: "NEW_AND_OLD_IMAGES"
      enum:
        - "KEYS_ONLY"
        - "NEW_IMAGE"
        - "OLD_IMAGE"
        - "NEW_AND_OLD_IMAGES"

  examples:
    - __name: "Development"
      region: us-east-1
      table_name: my-table
      hash_key: pk
      hash_key_type: "S"
      billing_mode: "PAY_PER_REQUEST"
      enable_streams: false
    - __name: "Production"
      region: us-east-1
      table_name: my-table
      hash_key: pk
      hash_key_type: "S"
      billing_mode: "PAY_PER_REQUEST"
      enable_streams: true
      stream_view_type: "NEW_AND_OLD_IMAGES"

connections:
  required:
    - aws_authentication
  properties:
    aws_authentication:
      $ref: aws-iam-role
      title: AWS Authentication

artifacts:
  required:
    - table
  properties:
    table:
      $ref: dynamodb
      title: DynamoDB Table

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - region
    - table_name
    - hash_key
    - hash_key_type
    - range_key
    - range_key_type
    - billing_mode
    - read_capacity
    - write_capacity
    - enable_streams
    - stream_view_type
    - "*"
