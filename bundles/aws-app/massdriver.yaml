name: aws-app
description: Helm-deployed nginx demo on EKS Fargate. Bare-minimum proof that the cluster + helm chain works.
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/aws-app
version: 0.0.0

steps:
  - path: chart
    provisioner: helm
    config:
      # The Massdriver helm provisioner reads
      # `.kubernetes_cluster.data.authentication.cluster.server` and
      # `.kubernetes_cluster.data.authentication.user.token`. The aws-eks-cluster
      # artifact is flat (endpoint / certificate_authority / token), so we shape
      # the v1 contract inline rather than carrying a `data` block on every
      # artifact in the catalog.
      kubernetes_cluster: '{data: {authentication: {cluster: {server: .connections.eks.endpoint, "certificate-authority-data": .connections.eks.certificate_authority}, user: {token: .connections.eks.token}}}}'
      namespace: '.params.namespace'
      release_name: '.params.namespace'
      timeout: '@text "5m0s"'
      wait: false
      checkov:
        halt_on_failure: '.params.md_metadata.default_tags["md-target"] | test("^(prod|prd|production)$")'

params:
  examples:
    - __name: Development
      namespace: app
      replicas: 1
    - __name: Production
      namespace: app
      replicas: 3
  required:
    - namespace
    - replicas
  properties:
    namespace:
      type: string
      title: Namespace
      description: Kubernetes namespace for the release. Must be covered by a Fargate profile on the connected cluster.
      default: app
      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      $md.immutable: true
    replicas:
      type: integer
      title: Replicas
      description: Number of pod replicas.
      default: 1
      minimum: 1
      maximum: 50

connections:
  required:
    - eks
  properties:
    eks:
      $ref: aws-eks-cluster
      title: EKS Cluster

artifacts:
  required:
    - application
  properties:
    application:
      $ref: aws-application
      title: Application

ui:
  ui:order:
    - namespace
    - replicas
    - "*"
