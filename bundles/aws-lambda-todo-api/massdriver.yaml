name: aws-lambda-todo-api
description: "AWS Lambda TODO REST API with API Gateway HTTP endpoint and DynamoDB backend. Bundle manages its own S3 deployment bucket and uploads the zip automatically."
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/aws-lambda-todo-api
version: 0.1.0

params:
  required:
    - region
    - lambda_memory_mb
    - lambda_timeout_sec
  properties:
    region:
      type: string
      title: AWS Region
      description: AWS region to deploy the Lambda function and API Gateway.
      $md.immutable: true
      enum:
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
        - ca-central-1
        - eu-west-1
        - eu-west-2
        - eu-central-1
        - ap-northeast-1
        - ap-northeast-2
        - ap-southeast-1
        - ap-southeast-2
        - ap-south-1
        - sa-east-1
    dynamodb_policy:
      type: string
      title: DynamoDB Access Policy
      description: IAM policy to attach to the Lambda execution role for DynamoDB access. Choose a policy exposed by the connected DynamoDB table.
      $md.enum:
        connection: dynamodb_table
        options: .policies
        value: .name
    lambda_memory_mb:
      type: integer
      title: Memory (MB)
      description: Amount of memory allocated to the Lambda function. Higher memory also increases CPU.
      default: 256
      minimum: 128
      maximum: 10240
    lambda_timeout_sec:
      type: integer
      title: Timeout (seconds)
      description: Maximum execution time for a single Lambda invocation before it is terminated.
      default: 30
      minimum: 1
      maximum: 900
    log_retention_days:
      type: integer
      title: CloudWatch Log Retention (days)
      description: Number of days to retain Lambda logs in CloudWatch. Set to 0 to retain indefinitely.
      default: 7
      enum:
        - 1
        - 3
        - 5
        - 7
        - 14
        - 30
        - 60
        - 90
        - 120
        - 150
        - 180
        - 365
  examples:
    - __name: Development
      region: us-east-1
      lambda_memory_mb: 128
      lambda_timeout_sec: 30
      log_retention_days: 7
    - __name: Production
      region: us-east-1
      lambda_memory_mb: 512
      lambda_timeout_sec: 30
      log_retention_days: 30

connections:
  required:
    - aws_authentication
    - dynamodb_table
  properties:
    aws_authentication:
      $ref: aws-catalog/aws-iam-role
      title: AWS Authentication
    dynamodb_table:
      $ref: aws-catalog/dynamodb
      title: DynamoDB Table

artifacts:
  required:
    - api
  properties:
    api:
      $ref: aws-catalog/application
      title: TODO API

operator_guide: |
  # TODO API — Operator Guide

  ## API Gateway Endpoint

  The API is exposed via AWS API Gateway HTTP API (v2). No custom domain or Route 53 is required — AWS provides a free public URL.

  The base URL is available in the `api` artifact:

  ```
  .connections.api.service_url
  ```

  ## Example curl Commands

  Replace `$BASE_URL` with the value of `.connections.api.service_url` from the artifact, or set it:

  ```bash
  BASE_URL="{{ .artifacts.api.service_url }}"
  ```

  ### List all TODOs

  ```bash
  curl "$BASE_URL/todos"
  ```

  ### Create a TODO

  ```bash
  curl -X POST "$BASE_URL/todos" \
    -H "Content-Type: application/json" \
    -d '{"title": "Buy groceries"}'
  ```

  ### Get a single TODO

  ```bash
  curl "$BASE_URL/todos/{id}"
  ```

  ### Update a TODO

  ```bash
  curl -X PUT "$BASE_URL/todos/{id}" \
    -H "Content-Type: application/json" \
    -d '{"completed": true}'
  ```

  ### Delete a TODO

  ```bash
  curl -X DELETE "$BASE_URL/todos/{id}"
  ```

  ## Architecture

  - **AWS Lambda** — Node.js handler deployed from S3 zip
  - **API Gateway HTTP API (v2)** — Proxy integration routes all requests to Lambda
  - **DynamoDB** — Backend table for todo storage (consumed via connection)
  - **IAM** — Least-privilege execution role with scoped DynamoDB policy

  ## Compliance Notes

  | Check | Control | Implementation |
  |-------|---------|----------------|
  | CKV_AWS_117 | Lambda inside VPC | Muted — serverless public API, no VPC needed |
  | CKV_AWS_50 | X-Ray tracing | Muted — optional observability, not required for this tier |
  | CKV_AWS_116 | Dead letter queue | Muted — synchronous API invocations, DLQ not applicable |

  ## Decommissioning

  Destroy the package from the Massdriver UI or CLI. All resources (Lambda, API Gateway, CloudWatch log group, IAM roles/policies) will be removed.

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - region
    - dynamodb_policy
    - lambda_memory_mb
    - lambda_timeout_sec
    - log_retention_days
    - "*"
