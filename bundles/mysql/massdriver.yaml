name: mysql
description: "Example MySQL bundle showing instance sizing, HA selection, character-set, and slow-query controls. Edit ./bundles/mysql/massdriver.yaml to match your IaC."
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/mysql
version: 0.1.0

params:
  examples:
    - __name: Development (single-AZ)
      db_version: "8.0"
      database_name: "appdev"
      username: "appdev"
      instance_size: "xs"
      allocated_storage_gb: 20
      backup_retention_days: 1
      character_set: "utf8mb4"
      collation: "utf8mb4_0900_ai_ci"
      slow_query_log_enabled: false
      high_availability: false
    - __name: Staging (single-AZ)
      db_version: "8.0"
      database_name: "appstg"
      username: "appstg"
      instance_size: "s"
      allocated_storage_gb: 100
      backup_retention_days: 7
      character_set: "utf8mb4"
      collation: "utf8mb4_0900_ai_ci"
      slow_query_log_enabled: true
      slow_query_log_long_query_time_seconds: 2
      high_availability: false
    - __name: Production (HA)
      db_version: "8.0"
      database_name: "appprd"
      username: "appprd"
      instance_size: "l"
      allocated_storage_gb: 500
      backup_retention_days: 35
      character_set: "utf8mb4"
      collation: "utf8mb4_0900_ai_ci"
      slow_query_log_enabled: true
      slow_query_log_long_query_time_seconds: 1
      high_availability: true
      multi_az_zones: 3
  required:
    - db_version
    - database_name
    - username
    - instance_size
    - allocated_storage_gb
  properties:
    db_version:
      title: MySQL Version
      description: MySQL major.minor version. Major-version upgrades require a destroy/recreate.
      type: string
      default: "8.0"
      $md.immutable: true
      oneOf:
        - const: "5.7"
          title: "5.7 (end-of-life — upgrade urgently)"
        - const: "8.0"
          title: "8.0 (current LTS)"
        - const: "8.1"
          title: "8.1 (innovation track)"
        - const: "8.4"
          title: "8.4 (next LTS)"
    database_name:
      title: Database Name
      description: Name of the application schema to create on first deploy.
      type: string
      default: "mydb"
      minLength: 1
      maxLength: 64
      pattern: ^[a-z][a-z0-9_]*$
      message:
        pattern: "Must start with a letter, then lowercase letters / digits / underscores. 1–64 characters."
      $md.immutable: true
    username:
      title: Database Username
      description: Application database user. The provisioner generates and rotates the password.
      type: string
      default: "appuser"
      minLength: 1
      maxLength: 32
      pattern: ^[a-z][a-z0-9_]*$
      message:
        pattern: "Must start with a letter, then lowercase letters / digits / underscores. 1–32 characters (MySQL caps usernames at 32)."
      $md.immutable: true
      $md.copyable: false
    instance_size:
      title: Instance Size
      description: T-shirt size mapped by the provisioner to a cloud-specific machine type.
      type: string
      default: "s"
      oneOf:
        - const: "xs"
          title: "Extra Small — dev only (2 vCPU, 1 GiB)"
        - const: "s"
          title: "Small (2 vCPU, 4 GiB)"
        - const: "m"
          title: "Medium (4 vCPU, 16 GiB)"
        - const: "l"
          title: "Large (8 vCPU, 32 GiB)"
        - const: "xl"
          title: "Extra Large (16 vCPU, 64 GiB)"
    allocated_storage_gb:
      title: Storage (GB)
      type: integer
      default: 20
      minimum: 20
      maximum: 16384
      multipleOf: 10
    backup_retention_days:
      title: Backup Retention (days)
      description: 0 disables backups entirely (do not use in production).
      type: integer
      default: 7
      minimum: 0
      maximum: 35
    character_set:
      title: Character Set
      description: Default character set for new tables. `utf8mb4` is the only sane choice for new apps.
      type: string
      default: "utf8mb4"
      enum:
        - "utf8mb4"
        - "utf8"
        - "latin1"
      $md.immutable: true
    collation:
      title: Collation
      description: Default collation. `utf8mb4_0900_ai_ci` is the MySQL 8.x default; pick `_bin` for case-sensitive comparisons.
      type: string
      default: "utf8mb4_0900_ai_ci"
      enum:
        - "utf8mb4_0900_ai_ci"
        - "utf8mb4_0900_as_cs"
        - "utf8mb4_bin"
        - "utf8mb4_unicode_ci"
      $md.immutable: true
    slow_query_log_enabled:
      title: Slow Query Log
      description: Log queries that exceed the threshold below. Useful in staging/prod; costs disk in dev.
      type: boolean
      default: false
    slow_query_log_long_query_time_seconds:
      title: Slow Query Threshold (seconds)
      description: Queries running longer than this are logged.
      type: integer
      default: 2
      minimum: 1
      maximum: 60
    high_availability:
      title: High Availability
      description: Run with a synchronous standby in a different AZ. Doubles cost; enables sub-minute failover.
      type: boolean
      default: false
    multi_az_zones:
      title: Number of AZs
      type: integer
      default: 2
      minimum: 2
      maximum: 3
    subnet_filter:
      title: Subnet Placement
      description: Which subnet from the connected network the instance lands in.
      type: string
      $md.enum:
        connection: network
        options: .subnets
        value: .id

dependencies:
  high_availability:
    oneOf:
      - properties:
          high_availability:
            const: false
      - properties:
          high_availability:
            const: true
        required:
          - multi_az_zones
  slow_query_log_enabled:
    oneOf:
      - properties:
          slow_query_log_enabled:
            const: false
      - properties:
          slow_query_log_enabled:
            const: true
        required:
          - slow_query_log_long_query_time_seconds

# v2: shown in the product as "dependencies". The key in massdriver.yaml stays
# `connections:` until a backward-compatible rename ships.
connections:
  required:
    - network
  properties:
    network:
      $ref: network
      title: Network

# v2: shown in the product as "resources". The key in massdriver.yaml stays
# `artifacts:` until a backward-compatible rename ships.
artifacts:
  required:
    - database
  properties:
    database:
      $ref: mysql
      title: MySQL Database

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - db_version
    - instance_size
    - allocated_storage_gb
    - database_name
    - username
    - character_set
    - collation
    - high_availability
    - multi_az_zones
    - backup_retention_days
    - slow_query_log_enabled
    - slow_query_log_long_query_time_seconds
    - subnet_filter
    - "*"
  db_version:
    ui:help: "Major-version upgrade is a destroy/recreate. Plan a maintenance window before changing."
  allocated_storage_gb:
    ui:widget: updown
  backup_retention_days:
    ui:widget: updown
    ui:help: "Production: 35. Staging: 7. Dev: 1. Compliance requirements override these defaults."
  slow_query_log_long_query_time_seconds:
    ui:widget: updown
  high_availability:
    ui:help: "Required for production. Roughly 2× cost; failover usually completes in under 60 seconds."
  multi_az_zones:
    ui:widget: updown
