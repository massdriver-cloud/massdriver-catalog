name: application
description: >-
  Demo application that consumes a MariaDB connection to illustrate how
  Massdriver encodes security and compliance into artifact connections —
  network access via security groups, credentials via Secrets Manager.
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/application
version: 0.1.0

params:
  required:
    - image
    - replicas
    - domain_name
  examples:
    - __name: Development
      image: "nginx:latest"
      replicas: 1
      port: 8080
      domain_name: "dev.example.com"
    - __name: Production
      image: "nginx:stable"
      replicas: 3
      port: 8080
      domain_name: "app.example.com"
  properties:
    image:
      type: string
      title: Container Image
      description: Container image to deploy
      default: "nginx:latest"
    replicas:
      type: integer
      title: Replicas
      description: Number of replicas to deploy
      default: 2
      minimum: 1
      maximum: 10
    port:
      type: integer
      title: Port
      description: Port the application listens on
      default: 8080
      minimum: 1
      maximum: 65535
    domain_name:
      type: string
      title: Domain Name
      description: Domain name for the application
      default: "app.example.com"
      pattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
    database_policy:
      type: string
      title: Database Access Policy
      description: Access policy to apply for database access. Options are dynamically populated from the connected MariaDB artifact.
      $md.enum:
        connection: database
        options: .policies
        value: .name

connections:
  required:
    - aws_vpc
    - aws_authentication
    - database
  properties:
    aws_vpc:
      $ref: aws-vpc
      title: AWS VPC
    aws_authentication:
      $ref: aws-iam-role
      title: AWS Authentication
    database:
      $ref: mariadb
      title: MariaDB Database

artifacts:
  required:
    - application
  properties:
    application:
      $ref: application

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - image
    - replicas
    - port
    - domain_name
    - database_policy
    - "*"
