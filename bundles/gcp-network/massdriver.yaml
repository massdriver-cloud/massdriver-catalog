name: gcp-network
description: Minimal GCP VPC network with a single regional subnet. Produces a
  gcp-network artifact consumed by landing-zone, Cloud Run, Vertex Workbench, and
  other data-platform bundles.
source_url: https://github.com/massdriver-cloud/massdriver-catalog/tree/main/bundles/gcp-network
version: 0.1.0

params:
  required:
    - region
    - network_name
    - subnet_cidr
  examples:
    - __name: Standard
      region: us-central1
      network_name: data-platform-vpc
      subnet_cidr: "10.0.0.0/20"
  properties:
    region:
      title: Region
      description: GCP region to deploy the subnet into (the VPC is global). Cannot
        be changed after the subnet is created — changing the region requires destroying
        and recreating all resources in this bundle.
      type: string
      $md.immutable: true
      default: us-central1
      enum:
        - us-central1
        - us-east1
        - us-east4
        - us-west1
        - us-west2
        - us-west3
        - us-west4
        - europe-west1
        - europe-west2
        - europe-west4
        - asia-east1
        - asia-northeast1
        - asia-southeast1

    network_name:
      title: Network Name
      description: Name for the VPC network resource. Cannot be changed after creation —
        renaming the network requires destroying and recreating all dependent resources
        (subnets, firewall rules).
      type: string
      $md.immutable: true
      default: data-platform-vpc
      pattern: ^[a-z][a-z0-9-]{0,61}[a-z0-9]$

    subnet_cidr:
      title: Subnet CIDR
      description: Primary IP range for the regional subnet. Cannot be changed after
        creation — expanding or changing the range requires subnet recreation.
      type: string
      $md.immutable: true
      default: "10.0.0.0/20"
      pattern: >-
        ^(?:[0-9]|[0-9]{2}|1[0-9][0-9]|2[0-4][0-9]|25[0-5])(?:\.(?:[0-9]|[0-9]{2}|1[0-9][0-9]|2[0-4][0-9]|25[0-5])){3}(?:/(?:[0-9]|1[0-9]|2[0-9]|3[0-2]))$

connections:
  required:
    - gcp_authentication
  properties:
    gcp_authentication:
      $ref: gcp-service-account
      title: GCP Credentials

artifacts:
  required:
    - network
  properties:
    network:
      $ref: gcp-network
      title: GCP Network

steps:
  - path: src
    provisioner: opentofu:1.10
    config:
      checkov:
        halt_on_failure: '.params.md_metadata.default_tags["md-target"] | test("^(prod|prd|production)$")'

ui:
  ui:order:
    - region
    - network_name
    - subnet_cidr
    - "*"
