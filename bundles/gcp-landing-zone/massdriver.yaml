name: gcp-landing-zone
description: Project-level governance construct for a GCP data platform. Enables required
  service APIs, applies project-level IAM bindings for human operators and groups, enforces
  org-policy guardrails, configures a billing budget with threshold alerts, and emits a
  single landing-zone artifact so downstream bundles only need one connection. Does NOT
  provision workload service accounts — each consumer bundle creates its own.
source_url: https://github.com/massdriver-cloud/massdriver-catalog/tree/main/bundles/gcp-landing-zone
version: 0.1.1

params:
  required:
    - enabled_apis
    - budget
    - iam_bindings
    - org_policies
  examples:
    - __name: Standard (no budget)
      enabled_apis:
        - compute.googleapis.com
        - iam.googleapis.com
        - cloudresourcemanager.googleapis.com
        - serviceusage.googleapis.com
        - run.googleapis.com
        - bigquery.googleapis.com
        - storage.googleapis.com
        - pubsub.googleapis.com
        - aiplatform.googleapis.com
        - notebooks.googleapis.com
        - logging.googleapis.com
        - monitoring.googleapis.com
      budget:
        enabled: false
      iam_bindings: []
      org_policies: []
    - __name: Standard (with budget)
      enabled_apis:
        - compute.googleapis.com
        - iam.googleapis.com
        - cloudresourcemanager.googleapis.com
        - serviceusage.googleapis.com
        - billingbudgets.googleapis.com
        - run.googleapis.com
        - bigquery.googleapis.com
        - storage.googleapis.com
        - pubsub.googleapis.com
        - aiplatform.googleapis.com
        - notebooks.googleapis.com
        - logging.googleapis.com
        - monitoring.googleapis.com
      budget:
        enabled: true
        billing_account_id: "012345-ABCDEF-012345"
        amount: 500
        threshold_percentages:
          - 50
          - 90
          - 100
        notification_emails:
          - platform-alerts@example.com
      iam_bindings: []
      org_policies:
        - constraint: constraints/iam.disableServiceAccountKeyCreation
          enforced: true
        - constraint: constraints/storage.publicAccessPrevention
          enforced: true
        - constraint: constraints/compute.requireOsLogin
          enforced: true
  properties:
    enabled_apis:
      title: Enabled APIs
      description: GCP service APIs to enable in this project. Select from the list.
        Add billingbudgets.googleapis.com if you enable a budget below.
      type: array
      uniqueItems: true
      items:
        type: string
        enum:
          - compute.googleapis.com
          - iam.googleapis.com
          - cloudresourcemanager.googleapis.com
          - serviceusage.googleapis.com
          - billingbudgets.googleapis.com
          - run.googleapis.com
          - bigquery.googleapis.com
          - storage.googleapis.com
          - pubsub.googleapis.com
          - aiplatform.googleapis.com
          - notebooks.googleapis.com
          - logging.googleapis.com
          - monitoring.googleapis.com
      default:
        - compute.googleapis.com
        - iam.googleapis.com
        - cloudresourcemanager.googleapis.com
        - serviceusage.googleapis.com

    iam_bindings:
      title: Project IAM Bindings
      description: Project-level IAM bindings for human operators and groups. Each entry
        grants a single member a role on this project. Uses google_project_iam_member
        (additive) — will not clobber bindings set outside Terraform. Intended for
        humans and groups, not workload service accounts (those are created by consumer bundles).
        Empty array is valid; bindings are optional.
      type: array
      default: []
      items:
        type: object
        required:
          - role
          - member
        properties:
          role:
            title: IAM Role
            description: GCP role identifier, e.g. roles/viewer or roles/bigquery.dataViewer
            type: string
            examples:
              - roles/viewer
              - roles/bigquery.dataViewer
              - roles/storage.objectViewer
          member:
            title: Member
            description: IAM member string. Prefix with user:, group:, or serviceAccount:.
            type: string
            examples:
              - user:alice@example.com
              - group:data-analysts@example.com

    org_policies:
      title: Org Policy Guardrails
      description: Project-scoped org-policy constraints to enforce security posture.
        Uses google_project_organization_policy applied at the project level (not org-wide).
        Each entry enforces or denies a named constraint. Empty array is valid.
        Common constraints are listed in the preset above.
      type: array
      default: []
      items:
        type: object
        required:
          - constraint
          - enforced
        properties:
          constraint:
            title: Constraint
            description: Org policy constraint name, e.g. constraints/iam.disableServiceAccountKeyCreation
            type: string
            examples:
              - constraints/iam.disableServiceAccountKeyCreation
              - constraints/storage.publicAccessPrevention
              - constraints/compute.requireOsLogin
              - constraints/compute.vmExternalIpAccess
          enforced:
            title: Enforced
            description: When true, the boolean constraint is enforced. For list constraints
              (e.g. vmExternalIpAccess), use enforced=true to deny all values.
            type: boolean
            default: true

    budget:
      title: Billing Budget
      description: Optionally configure a GCP billing budget with spend alerts for this environment.
        Enable billingbudgets.googleapis.com in the API list above when using this feature.
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          title: Enable Budget
          description: Create a GCP billing budget with threshold email alerts
          default: false
      dependencies:
        enabled:
          oneOf:
            - properties:
                enabled:
                  const: true
                billing_account_id:
                  title: Billing Account ID
                  description: GCP billing account to attach the budget to. Find it in
                    Cloud Console under Billing > Account management (format XXXXXX-XXXXXX-XXXXXX).
                    Cloud Billing must be enabled on the account.
                  type: string
                  pattern: "^[0-9A-Fa-f]{6}-[0-9A-Za-z]{6}-[0-9A-Za-z]{6}$"
                  examples:
                    - 015537-E00AAA-3F7EDD
                amount:
                  title: Budget Amount (USD)
                  description: Monthly spend limit in US dollars
                  type: number
                  minimum: 1
                  default: 500
                threshold_percentages:
                  title: Alert Thresholds (%)
                  description: Percentage spend thresholds at which email alerts are triggered.
                    E.g. 50 = 50%, 90 = 90%, 100 = 100%.
                  type: array
                  minItems: 1
                  maxItems: 5
                  default:
                    - 50
                    - 90
                    - 100
                  items:
                    type: number
                    minimum: 1
                    maximum: 150
                notification_emails:
                  title: Notification Emails
                  description: Email addresses to notify when spend thresholds are crossed (optional)
                  type: array
                  items:
                    type: string
                    format: email
              required:
                - billing_account_id
                - amount
                - threshold_percentages
            - properties:
                enabled:
                  const: false

connections:
  required:
    - gcp_authentication
    - network
  properties:
    gcp_authentication:
      $ref: gcp-service-account
      title: GCP Credentials

    network:
      $ref: catalog-demo/gcp-network
      title: GCP Network

artifacts:
  required:
    - landing_zone
  properties:
    landing_zone:
      $ref: catalog-demo/gcp-landing-zone
      title: GCP Landing Zone

steps:
  - path: src
    provisioner: opentofu:1.10
    config:
      checkov:
        halt_on_failure: '.params.md_metadata.default_tags["md-target"] | test("^(prod|prd|production)$")'

ui:
  ui:order:
    - enabled_apis
    - iam_bindings
    - org_policies
    - budget
    - "*"
  properties:
    budget:
      ui:order:
        - enabled
        - billing_account_id
        - amount
        - threshold_percentages
        - notification_emails
        - "*"
      properties:
        enabled:
          ui:widget: checkbox
        threshold_percentages:
          ui:options:
            orderable: false
          items:
            ui:title: "Threshold (%)"
    iam_bindings:
      items:
        ui:order:
          - role
          - member
          - "*"
    org_policies:
      items:
        ui:order:
          - constraint
          - enforced
          - "*"
        properties:
          enforced:
            ui:widget: checkbox
