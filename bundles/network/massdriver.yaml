name: network
description: "Example network bundle (edit in ./bundles/network/massdriver.yaml)"
source_url: https://github.com/YOUR_ORG/massdriver-catalog/tree/main/bundles/network
version: 0.0.0

params:
  required:
    - cidr
  properties:
    cidr:
      type: string
      title: Network CIDR
      description: CIDR block for the network
      default: "10.0.0.0/16"
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
    subnets:
      type: array
      title: Subnets
      default:
        - name: "subnet-a"
          cidr: "10.0.1.0/24"
        - name: "subnet-b"
          cidr: "10.0.2.0/24"
      items:
        type: object
        required:
          - name
          - cidr
        properties:
          name:
            type: string
            title: Subnet Name
          cidr:
            type: string
            title: Subnet CIDR
            pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

# v2: shown in the product as "dependencies". The key in massdriver.yaml stays
# `connections:` until a backward-compatible rename ships.
connections:
  required: []
  properties: {}

# v2: shown in the product as "resources". The key in massdriver.yaml stays
# `artifacts:` until a backward-compatible rename ships.
artifacts:
  required:
    - network
  properties:
    network:
      $ref: network
      title: Network

steps:
  - path: src
    provisioner: opentofu:1.10

ui:
  ui:order:
    - cidr
    - subnets
    - "*"
