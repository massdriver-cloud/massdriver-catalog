name: network
label: Network
icon: https://raw.githubusercontent.com/massdriver-cloud/massdriver-catalog/main/bundles/network/icon.svg

ui:
  connectionOrientation: link
  environmentDefaultGroup: networks
  instructions:
    - label: AWS VPC
      path: ./instructions/AWS VPC.md
    - label: Azure VNet
      path: ./instructions/Azure VNet.md
    - label: GCP VPC
      path: ./instructions/GCP VPC.md

schema:
  title: Network
  description: Virtual network with subnet allocations that other infrastructure attaches to.
  type: object
  additionalProperties: false
  required:
    - id
    - cidr
    - subnets
  properties:
    id:
      title: ID
      description: Identifier of the virtual network in the cloud provider (VPC ID, VNet ID, etc.).
      type: string
      minLength: 1
    cidr:
      title: CIDR
      description: Network address range in CIDR notation (e.g. 10.0.0.0/16).
      type: string
      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
      message:
        pattern: "Must be a valid IPv4 CIDR block, like 10.0.0.0/16."
      examples:
        - "10.0.0.0/16"
        - "172.16.0.0/12"
    region:
      title: Region
      description: Cloud region the network is provisioned in.
      type: string
      examples:
        - "us-east-1"
        - "westus2"
    subnets:
      title: Subnets
      description: Subnet allocations carved from this network.
      type: array
      minItems: 1
      items:
        type: object
        additionalProperties: false
        required:
          - id
          - cidr
        properties:
          id:
            title: ID
            description: Subnet resource identifier in the cloud provider.
            type: string
            minLength: 1
          cidr:
            title: CIDR
            description: Subnet address range in CIDR notation.
            type: string
            pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
            message:
              pattern: "Must be a valid IPv4 CIDR block."
          type:
            title: Type
            description: Whether the subnet is publicly reachable from the internet.
            type: string
            enum:
              - public
              - private
          availability_zone:
            title: Availability Zone
            description: Availability zone or fault domain the subnet lives in.
            type: string
